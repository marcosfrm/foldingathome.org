# Legacy WordPress → new-site URL redirects.
#
# http-context snippet: defines $fah_redirect per request. foldingathome.org.conf
# issues the 301 when it is non-empty. Place alongside the main conf (e.g. in
# /etc/nginx/conf.d/) so nginx includes it at http context.
#
# Originally generated by the old repo's migrate-wp.mjs; now static and
# hand-maintained. Some legacy URLs exceed the 64-byte default bucket → 128.
map_hash_bucket_size 128;
map $request_uri $fah_redirect {
  default "";

  # Dated WordPress permalinks → /news/<slug>.
  /2023/11/06/unraveling-the-secrets-of-g-protein-activation-a-molecular-odyssey/ /news/unraveling-the-secrets-of-g-protein-activation-a-molecular-odyssey;
