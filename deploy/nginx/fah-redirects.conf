  /2024/05/02/alphafold-opens-new-opportunities-for-foldinghome/ /news/alphafold-opens-new-opportunities-for-foldinghome;
  /2024/05/16/how-does-apoe-cause-alzheimers-disease/ /news/how-does-apoe-cause-alzheimers-disease;
  /2024/05/30/towards-physics-based-precision-medicine/ /news/towards-physics-based-precision-medicine;
