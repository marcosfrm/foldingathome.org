# Folding@home — public site origin behind CloudFlare.
# Static (prerendered + hashed assets) served from disk; dynamic routes
# (news, RSS, sitemap, /assets/<uuid>) proxied to the Nuxt SSR Node app
# on 127.0.0.1:3000. CloudFlare mode: Full (strict).
#
# Requires fah-redirects.conf (the $fah_redirect map) to be loaded at http
# context — install it alongside this file in /etc/nginx/conf.d/.

# :80 — ACME challenge + redirect to HTTPS.
server {
  listen 80;
  listen [::]:80;
  server_name foldingathome.org www.foldingathome.org;

  location /.well-known/acme-challenge/ {
    root /var/www/foldingathome.org/public;
  }
  location / {
    return 301 https://$host$request_uri;
  }
}

# :443 — origin TLS, served to CloudFlare.
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name foldingathome.org www.foldingathome.org;

  ssl_certificate     /etc/letsencrypt/live/foldingathome.org/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/foldingathome.org/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 1d;

  root /var/www/foldingathome.org/public;

  access_log /var/log/nginx/foldingathome.org.access.log;
  error_log  /var/log/nginx/foldingathome.org.error.log;

  # Legacy WordPress URL redirects (map defined at http context above).
  if ($fah_redirect != "") {
    return 301 $fah_redirect;
  }

  # WordPress REST API was never reimplemented; hand it off to the old site.
  location /wp-json/wp/v2/ {
    return 301 https://old.foldingathome.org$request_uri;
  }

  # Long-cache content-addressed bundles.
  location /_nuxt/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Prerendered pages first; anything not on disk falls through to SSR.
  location / {
    try_files $uri $uri/index.html @nuxt;
  }

  location @nuxt {
    proxy_pass         http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header   Host             $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript
    application/xml application/rss+xml image/svg+xml;
}
